<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>رد آخر - بازی کارآگاهی جنایی</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scene-overlay"></div>
    <div class="vignette"></div>

    <div class="game-wrapper">
        <aside class="case-panel">
            <div class="case-header">
                <h3>پرونده: زوال</h3>
                <div class="case-badge">محرمانه</div>
            </div>
            
            <div class="case-stats">
                <div class="stat-card">
                    <span class="stat-label">اعتبار کارآگاهی</span>
                    <span class="stat-value" id="detectiveCredit">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">تمرکز ذهنی</span>
                    <span class="stat-value" id="mentalFocus">100</span>
                    <div class="focus-bar"><div class="focus-fill" id="focusFill" style="width:100%"></div></div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">مدارک یافت شده</span>
                    <span class="stat-value" id="evidenceCount">0</span>
                </div>
            </div>
            
            <div class="evidence-section">
                <div class="section-title">مدارک و سرنخ‌ها</div>
                <div id="evidenceList" class="evidence-list">
                    <div class="empty-hint">هنوز مدرکی ثبت نشده</div>
                </div>
            </div>
            
            <div class="suspect-section">
                <div class="section-title">پروفایل مظنون</div>
                <div id="suspectProfile" class="suspect-text">در حال بررسی...</div>
            </div>
            
            <div class="ad-container" id="adContainer">
                <div class="ad-placeholder">
                    <span class="ad-icon"></span>
                    <span>فضای تبلیغاتی</span>
                </div>
            </div>
            
            <button id="sixthSenseBtn" class="sense-btn">حس ششم</button>
        </aside>

        <div class="container">
            <header>
                <div class="title-section">
                    <h1>رد آخر</h1>
                    <div class="subtitle">شهر زوال - پرونده باز</div>
                </div>
                <div class="stage-badge">
                    <span>مرحله</span>
                    <span id="stageNumber">1</span>
                    <span>از</span>
                    <span id="totalStages">5</span>
                </div>
            </header>

            <main>
                <div class="location-bar">
                    <span id="locationIcon">📍</span>
                    <span id="locationName">کافه آخرین پناه</span>
                    <span id="timeTag">03:42</span>
                </div>

                <div class="story-card">
                    <div class="story-text" id="narrativeText"></div>
                    <div class="clue-line" id="clueHint"></div>
                </div>

                <div class="puzzle-card">
                    <div class="puzzle-header">
                        <span class="puzzle-label">بازجویی</span>
                        <span class="difficulty" id="difficultyTag">سخت</span>
                    </div>
                    <div class="puzzle-question" id="puzzleQuestion"></div>
                    <div class="options-grid" id="optionsContainer"></div>
                </div>

                <div class="message-area" id="messageArea"></div>

                <div class="action-row">
                    <button id="resetBtn" class="btn-secondary">پرونده جدید</button>
                    <button id="continueBtn" class="btn-primary" disabled>ادامه</button>
                </div>
            </main>

            <footer>
                <div class="clues-footer">
                    <span>آخرین سرنخ ثبت شده:</span>
                    <span id="lastClue" class="last-clue-text">هیچ</span>
                </div>
            </footer>
        </div>
    </div>

    <div class="toast-message" id="toastMsg">ذخیره شد</div>

    <script src="script.js"></script>
</body>
</html>
